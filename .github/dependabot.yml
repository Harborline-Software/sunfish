version: 2
updates:
  # .NET Anchor app (MAUI)
  - package-ecosystem: nuget
    directory: /
    assignees:
      - "ctwoodwa"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      maui:
        patterns:
          - "Microsoft.Maui.*"
          - "Microsoft.AspNetCore.Components.WebView.Maui"
      aspnetcore:
        patterns:
          - "Microsoft.AspNetCore.*"
      testing:
        patterns:
          - "xunit*"
          - "bunit*"
          - "NSubstitute*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.*"

  # Web (React) app
  - package-ecosystem: npm
    directory: /apps/web
    assignees:
      - "ctwoodwa"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"

  # Desktop (Tauri) shell — npm
  - package-ecosystem: npm
    directory: /apps/desktop
    assignees:
      - "ctwoodwa"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      tauri:
        patterns:
          - "@tauri-apps/*"

  # Desktop (Tauri) shell — Rust
  - package-ecosystem: cargo
    directory: /apps/desktop/src-tauri
    assignees:
      - "ctwoodwa"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: github-actions
    directory: /
    assignees:
      - "ctwoodwa"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
