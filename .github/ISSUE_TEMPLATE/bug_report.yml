name: Bug Report
description: Report a bug in sunfish
labels: [bug, needs-triage]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - src/ (Anchor MAUI)
        - apps/web/ (React app)
        - apps/desktop/ (Tauri shell)
        - tests
        - Other / unsure
    validations:
      required: true

  - type: dropdown
    id: framework
    attributes:
      label: Platform
      options:
        - macOS (MacCatalyst)
        - Windows 10/11 (MAUI Win UI 3)
        - Web (Browser)
        - Tauri desktop
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
