name: CodeQL (javascript-typescript)

on:
  push:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/package.json"
      - "**/pnpm-lock.yaml"
      - "**/package-lock.json"
      - "**/vite.config.*"
      - "**/tsconfig*.json"
  pull_request:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/package.json"
      - "**/pnpm-lock.yaml"
      - "**/package-lock.json"
      - "**/vite.config.*"
      - "**/tsconfig*.json"
  schedule:
    # Weekly scan every Monday at 04:30 UTC — runs regardless of paths filter.
    - cron: "30 4 * * 1"

# Only runs when TypeScript/JavaScript source or config changes. C#-only
# PRs skip this job entirely. The scheduled weekly scan still covers all code.

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout sunfish
        uses: actions/checkout@v6
        with:
          path: sunfish

      - name: Checkout sibling shipyard
        uses: actions/checkout@v6
        with:
          repository: Harborline-Software/shipyard
          path: shipyard
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript
