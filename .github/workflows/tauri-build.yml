name: Tauri cross-platform build

on:
  push:
    branches: [main]
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/tauri-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/tauri-build.yml'

# sunfish/apps/desktop/ is the Tauri shell (was apps/anchor-tauri). The
# webview content typically comes from sunfish/apps/web; the Rust core depends
# on shipyard-side packages where applicable. CI checks out sibling shipyard
# so any cross-repo dependencies resolve.

concurrency:
  group: tauri-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
          - os: macos-13
            target: x86_64-apple-darwin
            bundle: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundle: msi
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: appimage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout sunfish
        uses: actions/checkout@v6
        with:
          path: sunfish

      - name: Checkout sibling shipyard
        uses: actions/checkout@v6
        with:
          repository: Harborline-Software/shipyard
          path: shipyard
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sunfish/apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sunfish/apps/desktop/src-tauri

      - name: Refresh Rust toolchain after cache restore
        run: rustup update stable --no-self-update && rustup target add ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build @sunfish/ui-react (sibling shipyard)
        working-directory: shipyard/packages/ui-react
        shell: bash
        run: |
          if [ -f package.json ]; then
            npm install
            npm run build
          fi

      - name: Install npm dependencies
        working-directory: sunfish/apps/desktop
        run: npm ci

      - name: Build Tauri app
        working-directory: sunfish/apps/desktop
        run: npm run tauri build -- --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: sunfish-desktop-${{ matrix.target }}
          path: |
            sunfish/apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/${{ matrix.bundle }}/*
          retention-days: 14
