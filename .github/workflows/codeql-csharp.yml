name: CodeQL (csharp)

on:
  push:
    branches: [main]
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.slnx"
      - "**/global.json"
      - "**/Directory.Packages.props"
      - "**/Directory.Build.props"
      - "**/Directory.Build.targets"
  pull_request:
    branches: [main]
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.slnx"
      - "**/global.json"
      - "**/Directory.Packages.props"
      - "**/Directory.Build.props"
      - "**/Directory.Build.targets"
  schedule:
    # Weekly scan every Monday at 04:30 UTC — runs regardless of paths filter.
    - cron: "30 4 * * 1"

# Only runs when C# source or project configuration changes. Frontend-only
# PRs (no .cs/.csproj changes) skip this job entirely, saving ~35 min of
# Windows runner time. The scheduled weekly scan still covers all code.

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: windows-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout sunfish
        uses: actions/checkout@v6
        with:
          path: sunfish

      - name: Checkout sibling shipyard
        uses: actions/checkout@v6
        with:
          repository: Harborline-Software/shipyard
          path: shipyard
          ref: main

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: sunfish/global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual

      - name: Build (csharp)
        working-directory: sunfish
        shell: bash
        run: |
          dotnet workload restore Sunfish.slnx
          dotnet restore Sunfish.slnx
          dotnet build Sunfish.slnx --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:csharp
